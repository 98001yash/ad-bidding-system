services:

  mysql:
    image: mysql:8
    container_name: bidding-mysql

    environment:
      MYSQL_ROOT_PASSWORD: yash8252

    ports:
      - "3307:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pyash8252"]
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped


  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    restart: unless-stopped



  prometheus:
    image: prom/prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus:/etc/prometheus

    depends_on:
      - campaign-service
      - bidder-service
      - auction-service

    restart: unless-stopped



  grafana:
    image: grafana/grafana
    container_name: grafana

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    depends_on:
      - prometheus

    restart: unless-stopped


  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin

    ports:
      - "9411:9411"

    restart: unless-stopped


  campaign-service:
    image: yash01er/campaign-service:v5
    container_name: campaign-service

    depends_on:
      mysql:
        condition: service_healthy

      kafka:
        condition: service_started

    ports:
      - "8090:8090"

    environment:
      SPRING_PROFILES_ACTIVE: docker

    restart: unless-stopped


  bidder-service:
    image: yash01er/bidder-service:v5
    container_name: bidder-service

    depends_on:
      kafka:
        condition: service_started

    ports:
      - "8093:8093"

    environment:
      SPRING_PROFILES_ACTIVE: docker

    restart: unless-stopped



  auction-service:
    image: yash01er/auction-service:v5
    container_name: auction-service

    depends_on:
      mysql:
        condition: service_healthy

      kafka:
        condition: service_started

    ports:
      - "8092:8092"

    environment:
      SPRING_PROFILES_ACTIVE: docker

    restart: unless-stopped


volumes:
  mysql-data: