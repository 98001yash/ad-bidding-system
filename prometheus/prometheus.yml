global:
  scrape_interval: 5s

scrape_configs:

  - job_name: 'campaign-service'

    metrics_path: '/actuator/prometheus'

    static_configs:
      - targets: ['campaign-service:8090']


  - job_name: 'bidder-service'

    metrics_path: '/actuator/prometheus'

    static_configs:
      - targets: ['bidder-service:8093']


  - job_name: 'auction-service'

    metrics_path: '/actuator/prometheus'

    static_configs:
      - targets: ['auction-service:8092']